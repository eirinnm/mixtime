<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixtime — DJ Set Duration Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            rb: {
              bg: '#1a1a1a',
              sidebar: '#222222',
              header: '#2a2a2a',
              row: '#252525',
              rowHover: '#2e2e2e',
              rowAlt: '#202020',
              accent: '#1db954',
              border: '#333333',
            }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    /* thin scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
  </style>
</head>
<body class="bg-rb-bg text-zinc-200 h-screen flex flex-col overflow-hidden" x-cloak x-data="app">

  <!-- Header -->
  <header class="bg-rb-header border-b border-rb-border px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-semibold tracking-tight text-white">Mixtime</h1>
      <span class="text-xs text-zinc-500">DJ Set Duration Calculator</span>
    </div>
    <label class="cursor-pointer bg-zinc-700 hover:bg-zinc-600 text-zinc-200 text-sm px-3 py-1.5 rounded transition">
      Load Collection XML
      <input type="file" accept=".xml" class="hidden" @change="loadFile($event)">
    </label>
  </header>

  <!-- Main area -->
  <div class="flex flex-1 min-h-0">

    <!-- Sidebar: Playlist tree -->
    <aside class="w-56 shrink-0 bg-rb-sidebar border-r border-rb-border flex flex-col">
      <div class="px-3 py-2 text-xs font-semibold text-zinc-400 uppercase tracking-wider border-b border-rb-border">Playlists</div>
      <div class="flex-1 overflow-y-auto py-1">
        <template x-if="!fileLoaded">
          <div class="px-3 py-4 text-xs text-zinc-500 italic">Load an XML file to browse playlists.</div>
        </template>
        <template x-for="(node, idx) in visibleNodes" :key="idx">
          <div
            class="flex items-center cursor-pointer select-none text-sm hover:bg-zinc-700/40 transition-colors"
            :class="selectedPlaylist === node ? 'bg-zinc-700/60 text-white' : 'text-zinc-300'"
            :style="'padding-left: ' + (node.depth * 16 + 8) + 'px; padding-top: 3px; padding-bottom: 3px; padding-right: 8px;'"
            @click="node.type === 'folder' ? toggleFolder(node) : selectPlaylist(node)"
          >
            <!-- Folder icon / chevron -->
            <template x-if="node.type === 'folder'">
              <svg class="w-3.5 h-3.5 mr-1.5 shrink-0 text-zinc-400 transition-transform duration-150"
                   :class="node.open ? 'rotate-90' : ''" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/>
              </svg>
            </template>
            <!-- Playlist icon -->
            <template x-if="node.type === 'playlist'">
              <svg class="w-3.5 h-3.5 mr-1.5 shrink-0 text-zinc-500" viewBox="0 0 20 20" fill="currentColor">
                <path d="M15 4a1 1 0 00-1.707-.707L9.586 7H4a1 1 0 00-1 1v4a1 1 0 001 1h5.586l3.707 3.707A1 1 0 0015 16V4z"/>
              </svg>
            </template>
            <span class="truncate" x-text="node.name"></span>
            <template x-if="node.type === 'playlist'">
              <span class="ml-auto text-xs text-zinc-500 shrink-0" x-text="node.trackKeys.length"></span>
            </template>
          </div>
        </template>
      </div>
    </aside>

    <!-- Main: Track table -->
    <main class="flex-1 flex flex-col min-w-0">
      <!-- Table header -->
      <div class="bg-rb-header border-b border-rb-border px-2 flex items-center text-xs font-medium text-zinc-400 uppercase tracking-wider shrink-0 h-8">
        <div class="w-8 shrink-0 flex justify-center">
          <input type="checkbox" class="accent-rb-accent"
                 :checked="allSelected" :indeterminate.prop="someSelected && !allSelected"
                 @change="toggleSelectAll()">
        </div>
        <div class="w-10 shrink-0 text-center">#</div>
        <div class="flex-[3] min-w-0 px-1">Title</div>
        <div class="flex-[2] min-w-0 px-1">Artist</div>
        <div class="w-16 shrink-0 text-right px-1">Dur.</div>
        <div class="w-16 shrink-0 text-right px-1">Active</div>
        <div class="w-14 shrink-0 text-right px-1">BPM</div>
        <div class="flex-[2] min-w-0 px-2">Track View</div>
      </div>

      <!-- Track rows -->
      <div class="flex-1 overflow-y-auto">
        <template x-if="!selectedPlaylist">
          <div class="flex items-center justify-center h-full text-sm text-zinc-500 italic">
            Select a playlist to view tracks.
          </div>
        </template>
        <template x-if="selectedPlaylist && currentTracks.length === 0">
          <div class="flex items-center justify-center h-full text-sm text-zinc-500 italic">
            Playlist is empty.
          </div>
        </template>
        <template x-for="(t, i) in currentTracks" :key="t.id">
          <div class="flex items-center px-2 h-9 text-sm border-b border-rb-border/50 hover:bg-rb-rowHover transition-colors cursor-default"
               :class="i % 2 === 0 ? 'bg-rb-row' : 'bg-rb-rowAlt'">
            <div class="w-8 shrink-0 flex justify-center">
              <input type="checkbox" class="accent-rb-accent"
                     :checked="selectedTrackIds.includes(t.id)"
                     @change="toggleTrack(t.id)">
            </div>
            <div class="w-10 shrink-0 text-center text-zinc-500 text-xs" x-text="i + 1"></div>
            <div class="flex-[3] min-w-0 px-1 truncate text-zinc-100" x-text="t.name"></div>
            <div class="flex-[2] min-w-0 px-1 truncate text-zinc-400" x-text="t.artist"></div>
            <div class="w-16 shrink-0 text-right px-1 text-zinc-400 tabular-nums" x-text="formatTime(t.totalTime)"></div>
            <div class="w-16 shrink-0 text-right px-1 tabular-nums"
                 :class="t.activeDuration < t.totalTime ? 'text-green-400' : 'text-zinc-400'"
                 x-text="formatTime(t.activeDuration)"></div>
            <div class="w-14 shrink-0 text-right px-1 text-zinc-400 tabular-nums" x-text="t.avgBpm > 0 ? t.avgBpm.toFixed(1) : '—'"></div>
            <div class="flex-[2] min-w-0 px-2 flex items-center">
              <div class="flex h-2.5 rounded-sm overflow-hidden w-full" :style="'max-width:' + barWidth(t.totalTime)">
                <!-- Pre-entry (red) -->
                <div class="bg-red-700/80" :style="'width:' + segPct(t.entry, t.totalTime)"></div>
                <!-- Active (green) -->
                <div class="bg-green-500" :style="'width:' + segPct(t.activeDuration, t.totalTime)"></div>
                <!-- Post-exit (red) -->
                <div class="bg-red-700/80" :style="'width:' + segPct(t.totalTime - t.exit, t.totalTime)"></div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </main>
  </div>

  <!-- Footer: Summary -->
  <footer class="bg-rb-header border-t border-rb-border px-4 py-2 flex items-center gap-6 text-sm shrink-0">
    <div class="text-zinc-400">
      Selected: <span class="text-white font-medium" x-text="selectedTrackIds.length">0</span> tracks
    </div>
    <div class="text-zinc-400">
      Total duration: <span class="text-white font-medium" x-text="formatTime(totalDuration)">0:00</span>
    </div>
    <div class="text-zinc-400">
      Active duration: <span class="text-white font-medium" x-text="formatTime(nativeDuration)">0:00</span>
    </div>
    <div class="text-zinc-400">
      Performance BPM duration: <span class="text-white font-medium" x-text="formatTime(perfDuration)">0:00</span>
    </div>
    <div class="flex items-center gap-2 ml-auto">
      <label class="text-zinc-400">Performance BPM:</label>
      <input type="number" min="60" max="200" step="0.1"
             class="w-20 bg-zinc-800 border border-rb-border rounded px-2 py-1 text-sm text-zinc-100 text-center tabular-nums focus:outline-none focus:border-zinc-500"
             x-model.number="performanceBpm">
    </div>
  </footer>

  <!-- App logic -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        fileLoaded: false,
        tracks: {},
        flatTree: [],
        selectedPlaylist: null,
        selectedTrackIds: [],
        performanceBpm: 128,

        // ─── File loading ──────────────────────────────
        loadFile(event) {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            this.parseXml(e.target.result);
          };
          reader.readAsText(file);
        },

        parseXml(text) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'application/xml');

          // Parse tracks
          this.tracks = {};
          const trackEls = doc.querySelectorAll('COLLECTION > TRACK');
          trackEls.forEach(el => {
            const t = this.parseTrack(el);
            if (t) this.tracks[t.id] = t;
          });

          // Parse playlist tree
          const root = doc.querySelector('PLAYLISTS > NODE');
          this.flatTree = [];
          if (root) {
            // Skip the ROOT node itself, process its children
            const children = root.querySelectorAll(':scope > NODE');
            children.forEach(child => this.flattenNode(child, 0));
          }

          this.selectedPlaylist = null;
          this.selectedTrackIds = [];
          this.fileLoaded = true;
        },

        parseTrack(el) {
          const id = el.getAttribute('TrackID');
          const name = el.getAttribute('Name') || 'Unknown';
          const artist = el.getAttribute('Artist') || '';
          const totalTime = parseFloat(el.getAttribute('TotalTime')) || 0;
          const avgBpm = parseFloat(el.getAttribute('AverageBpm')) || 0;

          // Parse position marks (Type="0" = cue point)
          const marks = el.querySelectorAll('POSITION_MARK');
          const memoryCues = [];
          const hotCues = [];

          marks.forEach(m => {
            const type = m.getAttribute('Type');
            if (type !== '0') return;
            const start = parseFloat(m.getAttribute('Start'));
            if (isNaN(start)) return;
            const num = parseInt(m.getAttribute('Num'), 10);
            if (num === -1) {
              memoryCues.push(start);
            } else if (num >= 0 && num <= 7) {
              hotCues.push(start);
            }
          });

          const { entry, exit } = this.computeMarks(memoryCues, hotCues, totalTime);
          const activeDuration = Math.max(0, exit - entry);

          return { id, name, artist, totalTime, avgBpm, entry, exit, activeDuration };
        },

        computeMarks(memoryCues, hotCues, totalTime) {
          const half = totalTime / 2;

          // ── Entry ──
          // 1. Memory cues in first half, earliest
          const memFirst = memoryCues.filter(s => s < half).sort((a, b) => a - b);
          let entry = null;
          if (memFirst.length > 0) {
            entry = memFirst[0];
          } else {
            // 2. Hot cues in first half, earliest
            const hotFirst = hotCues.filter(s => s < half).sort((a, b) => a - b);
            if (hotFirst.length > 0) {
              entry = hotFirst[0];
            }
          }
          if (entry === null) entry = 0;

          // ── Exit ──
          // 1. Memory cues in second half, latest
          const memSecond = memoryCues.filter(s => s >= half).sort((a, b) => a - b);
          let exit = null;
          if (memSecond.length > 0) {
            exit = memSecond[memSecond.length - 1];
          } else {
            // 2. Hot cues in second half, earliest
            const hotSecond = hotCues.filter(s => s >= half).sort((a, b) => a - b);
            if (hotSecond.length > 0) {
              exit = hotSecond[0];
            }
          }
          if (exit === null) exit = totalTime;

          return { entry, exit };
        },

        flattenNode(nodeEl, depth) {
          const type = nodeEl.getAttribute('Type');
          const name = nodeEl.getAttribute('Name') || '';

          if (type === '0') {
            // Folder
            const node = { name, type: 'folder', depth, open: true, trackKeys: [], _id: this.flatTree.length };
            this.flatTree.push(node);
            const children = nodeEl.querySelectorAll(':scope > NODE');
            children.forEach(child => this.flattenNode(child, depth + 1));
          } else if (type === '1') {
            // Playlist
            const trackEls = nodeEl.querySelectorAll(':scope > TRACK');
            const trackKeys = [];
            trackEls.forEach(t => {
              const key = t.getAttribute('Key');
              if (key) trackKeys.push(key);
            });
            const node = { name, type: 'playlist', depth, open: false, trackKeys, _id: this.flatTree.length };
            this.flatTree.push(node);
          }
        },

        // ─── Playlist sidebar ──────────────────────────
        get visibleNodes() {
          const result = [];
          let skipBelow = Infinity;
          for (const node of this.flatTree) {
            if (node.depth > skipBelow) continue;
            skipBelow = Infinity;
            result.push(node);
            if (node.type === 'folder' && !node.open) {
              skipBelow = node.depth;
            }
          }
          return result;
        },

        toggleFolder(node) {
          node.open = !node.open;
        },

        selectPlaylist(node) {
          this.selectedPlaylist = node;
          this.selectedTrackIds = [];
        },

        // ─── Track table ───────────────────────────────
        get currentTracks() {
          if (!this.selectedPlaylist) return [];
          return this.selectedPlaylist.trackKeys
            .map(k => this.tracks[k])
            .filter(Boolean);
        },

        get allSelected() {
          const ct = this.currentTracks;
          return ct.length > 0 && ct.every(t => this.selectedTrackIds.includes(t.id));
        },

        get someSelected() {
          return this.currentTracks.some(t => this.selectedTrackIds.includes(t.id));
        },

        toggleSelectAll() {
          if (this.allSelected) {
            // Deselect all in current view
            const ids = new Set(this.currentTracks.map(t => t.id));
            this.selectedTrackIds = this.selectedTrackIds.filter(id => !ids.has(id));
          } else {
            // Select all in current view
            const existing = new Set(this.selectedTrackIds);
            this.currentTracks.forEach(t => existing.add(t.id));
            this.selectedTrackIds = [...existing];
          }
        },

        toggleTrack(id) {
          const idx = this.selectedTrackIds.indexOf(id);
          if (idx >= 0) {
            this.selectedTrackIds.splice(idx, 1);
          } else {
            this.selectedTrackIds.push(id);
          }
        },

        // ─── Visual bar helpers ────────────────────────
        barWidth(totalTime) {
          const scale = 720; // 12 minutes
          const pct = Math.min((totalTime / scale) * 100, 100);
          return pct.toFixed(2) + '%';
        },

        segPct(segDuration, totalTime) {
          if (totalTime <= 0) return '0%';
          return ((segDuration / totalTime) * 100).toFixed(2) + '%';
        },

        // ─── Summary calculations ─────────────────────
        get selectedTracks() {
          return this.selectedTrackIds
            .map(id => this.tracks[id])
            .filter(Boolean);
        },

        get totalDuration() {
          return this.selectedTracks.reduce((sum, t) => sum + t.totalTime, 0);
        },

        get nativeDuration() {
          return this.selectedTracks.reduce((sum, t) => sum + t.activeDuration, 0);
        },

        get perfDuration() {
          const bpm = this.performanceBpm;
          if (!bpm || bpm <= 0) return this.nativeDuration;
          return this.selectedTracks.reduce((sum, t) => {
            if (t.avgBpm > 0) {
              return sum + t.activeDuration * (t.avgBpm / bpm);
            }
            return sum + t.activeDuration;
          }, 0);
        },

        // ─── Utilities ────────────────────────────────
        formatTime(seconds) {
          if (!seconds || seconds <= 0) return '0:00';
          const s = Math.round(seconds);
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const sec = s % 60;
          if (h > 0) {
            return h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
          }
          return m + ':' + String(sec).padStart(2, '0');
        },
      }));
    });
  </script>
</body>
</html>
